plugins { id 'com.android.application' }

android {
    namespace 'com.jlxc.wifitouchsender'
    compileSdk 35

    defaultConfig {
        applicationId 'com.jlxc.wifitouchsender'
        minSdk 26
        targetSdk 35
        versionCode 5
        versionName '1.4-hand-gesture-checked'

        // This sender is intended for flagship phones only.
        // Keeping only arm64 reduces native MediaPipe packaging problems and APK size.
        ndk { abiFilters 'arm64-v8a' }
    }

    packaging {
        jniLibs {
            // Keep modern packaging. Do NOT force legacy extraction; this is safer for Android 15+ / 16 KB page-size devices.
            useLegacyPackaging = false
        }
        resources {
            excludes += [
                    'META-INF/DEPENDENCIES',
                    'META-INF/LICENSE',
                    'META-INF/LICENSE.txt',
                    'META-INF/NOTICE',
                    'META-INF/NOTICE.txt'
            ]
        }
    }
}

dependencies {
    implementation 'com.google.mediapipe:tasks-vision:0.10.26.1'
}
