plugins { id 'com.android.application' }

android {
    namespace 'com.jlxc.wifitouchsender'
    compileSdk 35

    defaultConfig {
        applicationId 'com.jlxc.wifitouchsender'
        minSdk 26
        targetSdk 35
        versionCode 7
        versionName '1.5.2-model-path-fix'
        ndk { abiFilters 'arm64-v8a' }
    }
}

dependencies {
    implementation 'com.google.mediapipe:tasks-vision:0.10.26.1'
}
