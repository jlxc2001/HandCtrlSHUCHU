plugins { id 'com.android.application' }

android {
    namespace 'com.jlxc.wifitouchsender'
    compileSdk 35

    defaultConfig {
        applicationId 'com.jlxc.wifitouchsender'
        minSdk 26
        targetSdk 35
        versionCode 4
        versionName '1.3-hand-gesture-startup-safe'

        // This sender is intended for flagship phones only.
        // Keeping only arm64 reduces native MediaPipe packaging problems and APK size.
        ndk { abiFilters 'arm64-v8a' }
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
        resources {
            excludes += [
                    'META-INF/DEPENDENCIES',
                    'META-INF/LICENSE',
                    'META-INF/LICENSE.txt',
                    'META-INF/NOTICE',
                    'META-INF/NOTICE.txt'
            ]
        }
    }
}

dependencies {
    implementation 'com.google.mediapipe:tasks-vision:0.10.26'
}
