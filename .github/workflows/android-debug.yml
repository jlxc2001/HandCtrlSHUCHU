name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Download MediaPipe hand model
        run: |
          mkdir -p app/src/main/assets/models
          curl -L --retry 3 --fail --show-error \
            https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task \
            -o app/src/main/assets/models/hand_landmarker.task
          ls -lh app/src/main/assets/models/hand_landmarker.task
          test -s app/src/main/assets/models/hand_landmarker.task

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Verify model is inside APK
        run: |
          APK=$(ls app/build/outputs/apk/debug/*.apk | head -n 1)
          echo "APK=$APK"
          unzip -l "$APK" | grep -F "assets/models/hand_landmarker.task"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiFiTouchSender-hand-gesture-v5-5-debug-apk
          path: app/build/outputs/apk/debug/*.apk
